name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.2"
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: >-
            qtwebengine
            qtwebchannel
            qtpositioning

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Generate Windows icon
        run: magick app/assets/logo.png -define icon:auto-resize=16,32,48,64,128,256 app/assets/filka.ico

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Find executable
        shell: pwsh
        run: |
          Get-ChildItem -Path build -Filter "filka.exe" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "Found: $($_.FullName)" }

      - name: Deploy Qt
        run: windeployqt --release --qmldir app/qml ${{ github.workspace }}/build/app/filka.exe

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item build/app/filka.exe dist/
          Copy-Item app/assets/filka.ico dist/
          Get-ChildItem build/app/*.dll -ErrorAction SilentlyContinue | Copy-Item -Destination dist/
          foreach ($subdir in @("platforms", "styles", "imageformats", "tls", "networkinformation", "sqldrivers", "xcbglintegrations", "wayland-graphics-integration-client", "wayland-shell-integration")) {
            if (Test-Path "build/app/$subdir") {
              New-Item -ItemType Directory -Force -Path "dist/$subdir"
              Copy-Item "build/app/$subdir/*" "dist/$subdir/" -ErrorAction SilentlyContinue
            }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: filka-windows-x86_64
          path: dist/
          if-no-files-found: error
