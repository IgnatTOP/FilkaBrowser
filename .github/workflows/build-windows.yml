name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.2"
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: >-
            qtwebengine
            qtwebchannel
            qtpositioning

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Generate Windows icon
        run: magick app/assets/logo.png -define icon:auto-resize=16,32,48,64,128,256 app/assets/filka.ico

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install

      - name: Build
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build

      - name: Deploy Qt
        run: windeployqt --release --compiler-runtime --qmldir app/qml ${{ github.workspace }}/install/bin/filka.exe

      - name: Copy icon
        shell: pwsh
        run: Copy-Item app/assets/filka.ico install/bin/

      - name: Check DLL dependencies
        shell: pwsh
        run: |
          dumpbin /dependents install/bin/filka.exe 2>&1 | Select-String "\.dll"

      - name: List deployed files
        shell: pwsh
        run: Get-ChildItem -Path install/bin -Recurse | ForEach-Object { Write-Host $_.FullName }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: filka-windows-x86_64
          path: install/bin/
          if-no-files-found: error

      - name: Package exe for release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive -Path install/bin/* -DestinationPath filka-windows-x86_64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: filka-windows-x86_64.zip
          generate_release_notes: true
