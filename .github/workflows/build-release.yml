name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Windows — MSVC build, windeployqt bundle, zipped for the release.
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: >-
            qtwebengine
            qtwebchannel
            qtpositioning

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Generate Windows icon
        run: magick app/assets/logo.png -define icon:auto-resize=16,32,48,64,128,256 app/assets/filka.ico

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install

      - name: Build
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build

      - name: Deploy Qt
        run: windeployqt --release --compiler-runtime --qmldir app/qml ${{ github.workspace }}/install/bin/filka.exe

      - name: Copy launch files
        shell: pwsh
        run: |
          Copy-Item app/assets/filka.ico install/bin/
          Copy-Item filka.bat install/bin/

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path install/bin/* -DestinationPath Filka-${{ github.ref_name }}-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: filka-windows
          path: Filka-*-windows-x86_64.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux — GCC build packaged as a self-contained AppImage (bundles Qt +
  # WebEngine via linuxdeploy-plugin-qt, runs on any modern distro).
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build imagemagick \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev \
            libnss3 libxcomposite-dev libxdamage-dev libxrandr-dev \
            libxtst-dev libasound2-dev libxcb-cursor0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: >-
            qtwebengine
            qtwebchannel
            qtpositioning

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --config Release

      - name: Install into AppDir
        run: DESTDIR=${{ github.workspace }}/AppDir cmake --install build

      - name: Prepare desktop entry + icon
        run: |
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          # logo.png is 1024×1024; linuxdeploy only accepts valid hicolor sizes,
          # so down-scale it to a clean 256×256 for the desktop/AppImage icon.
          convert app/assets/logo.png -resize 256x256 \
            AppDir/usr/share/icons/hicolor/256x256/apps/filka.png
          cat > AppDir/usr/share/applications/filka.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Filka
          Comment=Премиальный браузер Filka
          Exec=filka
          Icon=filka
          Categories=Network;WebBrowser;
          Terminal=false
          EOF

      - name: Fetch linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Build AppImage
        env:
          # Run the tool AppImages without FUSE (unavailable on the runner).
          APPIMAGE_EXTRACT_AND_RUN: 1
          # Let the qt plugin scan our QML for imports it must bundle.
          QML_SOURCES_PATHS: ${{ github.workspace }}/app/qml
        run: |
          QMAKE="$(command -v qmake6 || command -v qmake)"
          export QMAKE
          QT_QML_DIR="$("$QMAKE" -query QT_INSTALL_QML)"
          QT_PLUGINS_DIR="$("$QMAKE" -query QT_INSTALL_PLUGINS)"
          # linuxdeploy-plugin-qt can't resolve our `Filka` module (it's compiled
          # into the binary), so expose its generated qmldir on Qt's import path.
          # The qmldir's `prefer :/qt/qml/Filka/` keeps the runtime on the
          # compiled-in copy, so there's no duplicate-module conflict.
          cp -r build/app/Filka "$QT_QML_DIR/Filka"
          # The Mimer SQL driver plugin needs a missing libmimerapi.so; we only
          # ship the SQLite driver, so drop it before deployment.
          rm -f "$QT_PLUGINS_DIR/sqldrivers/libqsqlmimer.so"
          # The NMEA position plugin (pulled in via WebEngine's QtPositioning dep)
          # links libQt6SerialPort, which we don't install. We don't use GPS
          # positioning, so remove it so linuxdeploy doesn't chase that library.
          rm -f "$QT_PLUGINS_DIR/position/libqtposition_nmea.so"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/filka \
            --desktop-file AppDir/usr/share/applications/filka.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/filka.png \
            --plugin qt \
            --output appimage
          mv Filka*.AppImage "Filka-${{ github.ref_name }}-linux-x86_64.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: filka-linux
          path: Filka-*-linux-x86_64.AppImage
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release — only on a version tag. Collects both builds into one GitHub
  # Release with the Russian changelog.
  # ---------------------------------------------------------------------------
  release:
    # Publish as long as Windows built; attach Linux too when it succeeded, so a
    # Linux hiccup never blocks the release entirely.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') && needs.build-windows.result == 'success' }}
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: filka-windows

      - name: Download Linux build
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: filka-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Filka ${{ github.ref_name }}"
          files: |
            Filka-*-windows-x86_64.zip
            Filka-*-linux-x86_64.AppImage
          body: |
            # Filka ${{ github.ref_name }}

            Крупное обновление: браузер дорос до полноценного повседневного
            использования и получил сквозную систему анимаций.

            ## ✨ Новые возможности
            - **Подсказки в адресной строке** — мгновенные совпадения из истории и
              закладок плюс живые поисковые подсказки. Навигация стрелками,
              Enter, Esc.
            - **Возврат закрытой вкладки** — `Ctrl+Shift+T` восстанавливает
              последнюю закрытую вкладку.
            - **Контекстное меню вкладки** (правый клик) — дублировать,
              закрепить, выключить звук, закрыть другие / справа.
            - **Звук вкладок** — индикатор воспроизведения и кнопка mute прямо на
              вкладке.
            - **Перетаскивание вкладок** мышью с плавным «магнитом» к месту.
            - **Новое окно** — `Ctrl+N` открывает независимое окно (общий профиль,
              свои вкладки).
            - **Печать / Сохранить как PDF** — `Ctrl+P` или пункт меню страницы.
            - **Страница ошибки** при сбое загрузки с кнопкой «Повторить».
            - **Очистка данных** — кэш и cookie в настройках конфиденциальности.

            ## 🎬 Анимации
            - Появление/удаление и перестановка вкладок, закладок, истории и
              загрузок.
            - Плавные контекстные меню и панель подсказок.
            - Микроанимации кнопок, бейджа зума и переключателя воркспейсов.

            ## ⬇️ Загрузки
            - **Windows:** `Filka-${{ github.ref_name }}-windows-x86_64.zip` —
              распакуйте и запустите `filka.exe`.
            - **Linux:** `Filka-${{ github.ref_name }}-linux-x86_64.AppImage` —
              `chmod +x` и запустите (FUSE-совместимый дистрибутив).
